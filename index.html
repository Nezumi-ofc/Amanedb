<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phantom Core — Sign In</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── Login Page Styles ─────────────────────────── */
    .login-wrap {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      position: relative;
    }

    /* Ambient background */
    .login-wrap::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 15% 50%, rgba(88,166,255,0.07) 0%, transparent 65%),
        radial-gradient(ellipse 50% 70% at 85% 50%, rgba(188,140,255,0.05) 0%, transparent 65%);
      pointer-events: none;
    }

    /* Dot-grid texture */
    .dot-grid {
      position: fixed; inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.07) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 0%, transparent 100%);
      -webkit-mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 0%, transparent 100%);
    }

    .login-card {
      position: relative; z-index: 1;
      width: 100%; max-width: 410px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow-lg), 0 0 0 1px rgba(88,166,255,0.06);
      overflow: hidden;
      animation: cardIn 0.45s cubic-bezier(0.4,0,0.2,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(22px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0)    scale(1);    }
    }

    /* Card top strip */
    .card-strip {
      height: 3px;
      background: linear-gradient(90deg, var(--blue) 0%, var(--violet) 100%);
    }

    .login-head {
      padding: 28px 32px 22px;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }

    .login-logo {
      width: 52px; height: 52px;
      background: linear-gradient(135deg, var(--blue) 0%, var(--violet) 100%);
      border-radius: 13px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 20px; color: #fff;
      margin-bottom: 14px;
      box-shadow: 0 6px 20px rgba(88,166,255,0.35);
    }

    .login-title   { font-size: 19px; font-weight: 800; color: var(--text); letter-spacing: -0.3px; margin-bottom: 4px; }
    .login-caption { font-size: 12px; color: var(--text-muted); }

    .v-chip {
      display: inline-block;
      margin-top: 8px;
      padding: 2px 10px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 99px;
      font-size: 10px; font-family: var(--font-mono);
      color: var(--text-dim);
      letter-spacing: 0.5px;
    }

    .login-body   { padding: 24px 32px 20px; }
    .login-footer { padding: 0 32px 28px; }

    .or-row {
      display: flex; align-items: center; gap: 12px;
      margin: 18px 0;
      font-size: 12px; color: var(--text-dim);
    }

    .or-row::before, .or-row::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    /* WhatsApp button special color */
    .btn-wa {
      background: rgba(37,211,102,0.08);
      color: #25d366;
      border: 1px solid rgba(37,211,102,0.2);
    }

    .btn-wa:hover {
      background: #25d366; color: #fff;
      box-shadow: 0 4px 14px rgba(37,211,102,0.35);
    }

    /* Copyright footer */
    .login-copyright {
      text-align: center;
      margin-top: 24px;
      font-size: 11px; color: var(--text-dim);
    }
  </style>
</head>
<body>
<div id="toast-wrap"></div>

<div class="login-wrap">
  <div class="dot-grid"></div>

  <div class="login-card">
    <div class="card-strip"></div>

    <div class="login-head">
      <div class="login-logo"><i class="fas fa-ghost"></i></div>
      <div class="login-title">Phantom Core</div>
      <div class="login-caption">Secure Database Management System</div>
      <div class="v-chip">v2.0.4 / SECURE_NODE</div>
    </div>

    <div class="login-body">
      <!-- Error alert -->
      <div class="alert alert-error" id="login-err" style="display:none">
        <i class="fas fa-exclamation-triangle"></i>
        <span>Invalid username or password. Please try again.</span>
      </div>

      <div class="form-group">
        <label class="form-label">Username</label>
        <div class="input-icon">
          <i class="fas fa-user"></i>
          <input class="form-control" id="u" placeholder="Enter your username" autocomplete="off">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-icon">
          <i class="fas fa-lock"></i>
          <input class="form-control" id="p" type="password" placeholder="Enter your password">
        </div>
      </div>

      <button class="btn btn-primary btn-block btn-lg" id="login-btn" style="margin-top:10px">
        <i class="fas fa-sign-in-alt"></i>
        Sign In
      </button>
    </div>

    <div class="login-footer">
      <div class="or-row">or</div>
      <button class="btn btn-wa btn-block" id="request-btn">
        <i class="fab fa-whatsapp"></i>
        Request Access via WhatsApp
      </button>
    </div>
  </div>

  <div class="login-copyright">
    &copy; 2024 Phantom Core &mdash; All rights reserved
  </div>
</div>

<script src="script.js"></script>
<script>
  // Redirect if already authenticated
  if (getSession()) window.location.href = "dashboard.html";

  // WhatsApp request
  document.getElementById("request-btn").onclick = () => {
    const msg = encodeURIComponent("Halo, saya ingin request akses ke Phantom Core Database.");
    window.open(`https://wa.me/6289529161314?text=${msg}`, "_blank");
  };

  // Enter key support
  ["u", "p"].forEach(id => {
    document.getElementById(id).addEventListener("keydown", e => {
      if (e.key === "Enter") doLogin();
    });
  });

  document.getElementById("login-btn").onclick = doLogin;

  async function doLogin() {
    const u    = document.getElementById("u").value.trim();
    const p    = document.getElementById("p").value.trim();
    const errEl = document.getElementById("login-err");
    const btn   = document.getElementById("login-btn");

    errEl.style.display = "none";

    if (!u || !p) {
      errEl.style.display = "flex";
      errEl.querySelector("span").textContent = "Please fill in all fields.";
      return;
    }

    btnLoading(btn, true);
    showToast("Verifying credentials...", "info");

    // Hardcoded owner
    if (u === "amane" && p === "cel2010") {
      localStorage.setItem("user_role", "owner1");
      showToast("Access granted! Redirecting...", "success");
      setTimeout(() => window.location.href = "dashboard.html", 900);
      return;
    }

    try {
      const data  = await ghGet(REPO_USERS, FILE_USERS, TOKEN_2);
      const users = JSON.parse(atob(data.content)).users || [];
      const found = users.find(usr => usr.username === u && usr.password === p);

      if (found) {
        localStorage.setItem("user_role", "owner2");
        showToast("Access granted! Redirecting...", "success");
        setTimeout(() => window.location.href = "dashboard.html", 900);
      } else {
        errEl.style.display = "flex";
        errEl.querySelector("span").textContent = "Invalid username or password.";
        showToast("Access denied.", "error");
        btnLoading(btn, false, '<i class="fas fa-sign-in-alt"></i> Sign In');
      }
    } catch (e) {
      showToast("Connection error. Try again.", "error");
      btnLoading(btn, false, '<i class="fas fa-sign-in-alt"></i> Sign In');
    }
  }
</script>
</body>
</html>
